name: Test VPN
on:
  #pull_request:
  workflow_dispatch:

jobs:
 test-vpn:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Get Endpoint Address
      run: |
        curl -A "Endpoint = " ${{ secrets.WEBHOOK_ENDPOINT }}?iface=wg0

    - name: Attach WireGuard connection
      shell: bash
      run: |
        sudo apt install resolvconf
        sudo apt install wireguard
        echo "${{ secrets.WIREGUARD_CONFIG }}" > wg0.conf
        sudo chmod 600 wg0.conf
        sudo wg-quick up ./wg0.conf      

    - name: cURL with VPN
      run: |
        curl -A "GitHub Wireguard-VPN" ${{ secrets.WEBHOOK_ENDPOINT }}?type=with-vpn-1

    - name: Detach WireGuard connection
      if: always()
      shell: bash
      run: sudo wg-quick down ./wg0.conf

