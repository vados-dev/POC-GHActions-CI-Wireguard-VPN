name: Test VPN

permissions:
  actions: write
  contents: read

env:
    TIME: $(date +'%d.%m.%Y-%T')
    LogDir: ${{ runner.temp }}/logs
    LogFilename: "vpn-access-${{ env.Time }}.log"
    LogFile: ${{ env.LOG_DIR }}/${{ env.LOG_FILENAME }}
    WEBHOOK_ENDPOINT: ${{ secrets.WEBHOOK_ENDPOINT }}
    WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
    
on:
  #pull_request:
  workflow_dispatch:

jobs:
 test-vpn:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Get Endpoint Address
      shell: bash
      run: |
        sudo mkdir ${{ env.LogDir }}
        echo "${{ env.TIME }} - Logile Start." >> ${{ env.LogFile }}
        curl -A "Endpoint = " ${{ env.WEBHOOK_ENDPOINT }}?iface=wg0 
      continue-on-error: true
        
    - name: Attach WireGuard connection
      shell: bash
      run: |
        sudo apt install -y resolvconf wireguard wireguard-tools
        echo "${{ env.WIREGUARD_CONFIG }}" > /etc/wireguard/wg0.conf
        sudo cat /etc/wireguard/wg0.conf
        sudo chmod 600 /etc/wireguard/wg0.conf
        sudo wg-quick up /etc/wireguard/wg0.conf
        sleep 5
        sudo wg show
        sudo wg showconf wg0
        curl -A "endpoint = " ${{ env.WEBHOOK_ENDPOINT }}?type=with-vpn-1
        ping ya.ru
          
    - name: Detach WireGuard connection
      if: ${{ failure() }}
      shell: bash
      run: |
        echo "${{ env.TIME }} - Failure" >> ${{ env.LogFile }}
        sudo wg-quick down /etc/wireguard/wg0.conf >> ${{ env.LogFile }}
        echo "${{ env.TIME }} - Logs from VPN End." >> ${{ env.LogFile }}

    - name: Upload Logs on Failure
      uses: actions/upload-artifact@v4
      with:
        name: Build failure logs
        path: ${{ env.LogDir }}

